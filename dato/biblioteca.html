<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Biblioteca</span>
    </div>
</nav>

<div class="container mt-4">

    <h2>Agregar Libro</h2>

    <form id="form-libro" class="border p-3 rounded bg-light mb-4">

        <div class="mb-2">
            <label>ISBN</label>
            <input type="text" id="isbn" class="form-control" placeholder="ISBN del libro">
        </div>
        <div class="mb-2">
            <label>Título *</label>
            <input type="text" id="titulo" class="form-control" placeholder="Título" required>
        </div>
        <div class="mb-2">
            <label>Autor *</label>
            <input type="text" id="autor" class="form-control" placeholder="Autor" required>
        </div>
        <div class="mb-2">
            <label>Páginas</label>
            <input type="number" id="paginas" class="form-control" placeholder="Páginas">
        </div>
        <div class="mb-2">
            <label>Precio</label>
            <input type="number" id="precio" class="form-control" placeholder="Precio">
        </div>
        <div class="mb-2">
            <label>Fecha de publicación</label>
            <input type="date" id="fecha" class="form-control">
        </div>
        <div class="mb-2">
            <label>Disponible</label>
            <select id="disponible" class="form-control">
                <option value="">Seleccione</option>
                <option value="true">Si</option>
                <option value="false">No</option>
            </select>
        </div>
        <div class="mb-2">
            <label>Géneros</label>
            <select id="generos" class="form-control">
                <option value="">Seleccione</option>
                <option>Romance</option>
                <option>Misterio</option>
                <option>Ciencia Ficcion</option>
                <option>Fantasia</option>
                <option>Historia</option>
                <option>Terror</option>
                <option>Programación</option>
                <option>Tecnología</option>
            </select>
        </div>
        <div class="mb-2">
            <label>Editorial</label>
            <input type="text" id="editorialNombre" class="form-control" placeholder="Nombre editorial">
        </div>
        <div class="mb-3">
            <label>País editorial</label>
            <input type="text" id="editorialPais" class="form-control" placeholder="País">
        </div>

        <button type="submit" id="btn-guardar" class="btn btn-primary">Guardar</button>

    </form>

    <p id="msg" class="text-success fw-bold"></p>

    <h2>Lista de Libros</h2>
    <table class="table table-bordered table-striped">
        <thead class="table-primary">
            <tr>
                <th>Título</th>
                <th>Autor</th>
                <th>ISBN</th>
                <th>Género</th>
                <th>Precio</th>
                <th>Disponible</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
    </table>

</div>


<script src="script.js"></script>
</body>
</html>
